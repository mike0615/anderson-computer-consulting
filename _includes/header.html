<nav class="acc-navbar">
  <a href="{{ '/' | relative_url }}" class="navbar-brand">
    <img src="{{ '/assets/images/logo/acc-logo.svg' | relative_url }}" alt="Anderson Computer Consulting">
  </a>

  <button class="navbar-toggle" aria-label="Toggle navigation">&#9776;</button>

  <ul class="nav-links">
    {% for item in site.data.navigation.main %}
    <li>
      <a href="{{ item.url | relative_url }}"
         {% if page.url contains item.url and item.url != '/' %}class="active"{% endif %}>
        {{ item.title }}
        {% if item.children %}<i class="bi bi-chevron-down" style="font-size:10px;margin-left:2px;"></i>{% endif %}
      </a>
      {% if item.children %}
      <div class="nav-dropdown">
        {% for child in item.children %}
        <a href="{{ child.url | relative_url }}">{{ child.title }}</a>
        {% endfor %}
      </div>
      {% endif %}
    </li>
    {% endfor %}
    <li>
      <a href="{{ '/contact/' | relative_url }}" class="nav-cta">Get a Quote</a>
    </li>
  </ul>
</nav>
