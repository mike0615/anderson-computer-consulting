<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 80" width="340" height="80">
  <defs>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00e5ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0077ff;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Circuit board traces behind A -->
  <line x1="8" y1="20" x2="8" y2="10" stroke="#00e5ff" stroke-width="1" opacity="0.4"/>
  <line x1="8" y1="10" x2="18" y2="10" stroke="#00e5ff" stroke-width="1" opacity="0.4"/>
  <circle cx="18" cy="10" r="2" fill="#00e5ff" opacity="0.6"/>
  <line x1="60" y1="60" x2="60" y2="70" stroke="#00e5ff" stroke-width="1" opacity="0.4"/>
  <line x1="60" y1="70" x2="50" y2="70" stroke="#00e5ff" stroke-width="1" opacity="0.4"/>
  <circle cx="50" cy="70" r="2" fill="#00e5ff" opacity="0.6"/>

  <!-- "ACC" letters -->
  <text x="4" y="62" font-family="'Courier New', monospace" font-size="58" font-weight="900"
        fill="url(#cyanGrad)" filter="url(#glow)" letter-spacing="-2">ACC</text>

  <!-- Vertical divider line -->
  <line x1="158" y1="15" x2="158" y2="65" stroke="#243040" stroke-width="1.5"/>

  <!-- Circuit node on divider -->
  <circle cx="158" cy="40" r="3" fill="#00e5ff" opacity="0.7"/>
  <line x1="158" y1="40" x2="168" y2="40" stroke="#00e5ff" stroke-width="1" opacity="0.4"/>
  <circle cx="168" cy="40" r="2" fill="#00e5ff" opacity="0.5"/>

  <!-- Company name text block -->
  <text x="168" y="34" font-family="'Courier New', monospace" font-size="13" font-weight="700"
        fill="#e8f0f8" letter-spacing="2">ANDERSON</text>
  <text x="168" y="50" font-family="'Courier New', monospace" font-size="13" font-weight="700"
        fill="#e8f0f8" letter-spacing="2">COMPUTER</text>
  <text x="168" y="66" font-family="'Courier New', monospace" font-size="11" font-weight="400"
        fill="#9eb3c8" letter-spacing="3">CONSULTING</text>

  <!-- Small circuit traces top-right -->
  <line x1="320" y1="14" x2="335" y2="14" stroke="#00e5ff" stroke-width="1" opacity="0.3"/>
  <circle cx="335" cy="14" r="2" fill="#00e5ff" opacity="0.5"/>
  <line x1="320" y1="66" x2="335" y2="66" stroke="#00e5ff" stroke-width="1" opacity="0.3"/>
  <circle cx="335" cy="66" r="2" fill="#00e5ff" opacity="0.5"/>
</svg>
